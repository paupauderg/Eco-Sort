<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EcoSort</title>

<style>
body{margin:0;font-family:Arial;background:#1e3c72;color:white;overflow:hidden;}
.screen{display:none;text-align:center;padding-top:50px;}
.active{display:block}

.container{display:flex;height:100vh;}
.side{flex:1;border-right:2px solid white;position:relative;}
.side:last-child{border:none;}

.hud{position:absolute;top:10px;left:10px;}
.item{margin-top:100px;font-size:22px;}

.bins{
position:fixed;bottom:0;width:100%;
display:flex;justify-content:center;gap:10px;
background:#000000aa;padding:10px;
}

.bin{
width:160px;height:70px;
line-height:20px;
padding-top:15px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
text-align:center;
font-size:14px;
}

.bio{background:green;}
.nonbio{background:red;}
.recycle{background:blue;}

.falling{
position:absolute;
top:0;
background:#fff;color:#000;
padding:8px;border-radius:8px;
}

.trashcan{
position:absolute;
bottom:120px;
width:150px;height:60px;
background:#ff9800;
color:black;
font-weight:bold;
line-height:60px;
text-align:center;
border-radius:10px;
font-size:12px;
}

.controls{
position:fixed;
bottom:10px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 10px;
}

.ctrlBtn{
width:45%;
height:80px;
font-size:22px;
border-radius:15px;
border:none;
background:#ffffffcc;
}

button{padding:10px 20px;margin:10px;border:none;border-radius:10px;}
</style>
</head>

<body>

<div id="s1" class="screen active">
<h1>♻️ EcoSort</h1>
<p>Rotate phone to LANDSCAPE for better control. KUNG AYAW MO, DE WAG!
<button onclick="next('Name')">Start</button>
</div>

<div id="sName" class="screen">
<h2>Enter Name</h2>
<input id="username">
<br><br>
<button onclick="saveName()">Continue</button>
</div>

<div id="s2" class="screen">
<button onclick="setLevel(45)">Easy (45s)</button>
<button onclick="setLevel(30)">Medium (30s)</button>
<button onclick="setLevel(20)">Hard (20s)</button>
</div>

<div id="s3" class="screen">
<button onclick="setMode('sort')">Sorting</button>
<button onclick="setMode('quiz')">Quiz</button>
<button onclick="next('fallSelect')">Falling</button>
</div>

<div id="sfallSelect" class="screen">
<button onclick="startFall('bio')">BIODEGRADABLE</button>
<button onclick="startFall('nonbio')">NON-BIODEGRADABLE</button>
<button onclick="startFall('recycle')">RECYCLABLE</button>
</div>

<div id="s4" class="screen">

<h3 id="direction"></h3>

<div class="container">

<div class="side" id="playerSide">
<h2>YOU</h2>
<div class="hud">
<div id="scoreP">Score:0</div>
<div id="timer">Time:0</div>
</div>
<div id="itemP" class="item"></div>
</div>

<div class="side" id="aiSide">
<h2>AI 🤖</h2>
<div class="hud">
<div id="scoreAI">AI:0</div>
</div>
<div id="itemAI" class="item"></div>
</div>

</div>

<div class="bins" id="bins">
<div class="bin bio" onclick="playerCheck('bio')">BIODEGRADABLE</div>
<div class="bin nonbio" onclick="playerCheck('nonbio')">NON-BIODEGRADABLE</div>
<div class="bin recycle" onclick="playerCheck('recycle')">RECYCLABLE</div>
</div>

<div id="controls" class="controls" style="display:none;">
<button class="ctrlBtn" onclick="moveLeft()">⬅</button>
<button class="ctrlBtn" onclick="moveRight()">➡</button>
</div>

</div>

<script>

function next(n){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");
}

let playerName="";
function saveName(){
let n=document.getElementById("username").value;
if(!n){alert("Enter name");return;}
playerName=n;
next(2);
}

let time=30,score=0,aiScore=0,mode,current;
let timerInt,fallInterval,targetType;
let canP,canAI,xP,xAI;

const waste=[
{name:"banana peel",type:"bio"},
{name:"plastic bottle",type:"nonbio"},
{name:"paper",type:"recycle"}
];

function setLevel(t){time=t;next(3);}
function setMode(m){mode=m;startGame();}

function startGame(){
score=0;aiScore=0;
document.getElementById("bins").style.display="flex";
document.getElementById("controls").style.display="none";
next(4);
newRound();
startTimer();
startAI();
}

function startTimer(){
timer.innerText="Time:"+time;
timerInt=setInterval(()=>{
time--;
timer.innerText="Time:"+time;
if(time<=0){
clearInterval(timerInt);
clearInterval(fallInterval);
alert("You:"+score+" AI:"+aiScore);
location.reload();
}
},1000);
}

function newRound(){
current=waste[Math.random()*waste.length|0];
itemP.innerText=current.name;
itemAI.innerText=current.name;
}

function playerCheck(ans){
if(ans===current.type) score++; else score--;
scoreP.innerText="Score:"+score;
newRound();
}

/* AI SORT/QUIZ */
function startAI(){
setInterval(()=>{
let guess=["bio","nonbio","recycle"][Math.random()*3|0];
if(guess===current.type) aiScore++;
scoreAI.innerText="AI:"+aiScore;
},1000);
}

/* FALLING SPLIT */
function startFall(type){
targetType=type;
document.getElementById("bins").style.display="none";
document.getElementById("controls").style.display="flex";
next(4);

direction.innerText="Catch ONLY "+type.toUpperCase();

/* PLAYER CAN */
canP=document.createElement("div");
canP.className="trashcan";
canP.style.left="25%";
canP.innerText=type;
document.body.appendChild(canP);

/* AI CAN */
canAI=document.createElement("div");
canAI.className="trashcan";
canAI.style.left="75%";
canAI.innerText=type;
document.body.appendChild(canAI);

xP=window.innerWidth*0.25;
xAI=window.innerWidth*0.75;

fallInterval=setInterval(()=>{
let obj=waste[Math.random()*waste.length|0];

let div=document.createElement("div");
div.className="falling";
div.innerText=obj.name;
div.style.left=Math.random()*window.innerWidth+"px";
document.body.appendChild(div);

let y=0;
let move=setInterval(()=>{
y+=6;
div.style.top=y+"px";

if(y>window.innerHeight-150){

/* PLAYER */
if(Math.abs(xP-div.offsetLeft)<80){
if(obj.type===targetType) score++; else score--;
scoreP.innerText="Score:"+score;
}

/* AI AUTO MOVE */
xAI += (div.offsetLeft - xAI)*0.3;
canAI.style.left=xAI+"px";

if(Math.abs(xAI-div.offsetLeft)<80){
if(obj.type===targetType) aiScore++; else aiScore--;
scoreAI.innerText="AI:"+aiScore;
}

div.remove();
clearInterval(move);
}
},50);

},1200);

startTimer();
}

/* PLAYER MOVE */
function moveLeft(){xP-=40;canP.style.left=xP+"px";}
function moveRight(){xP+=40;canP.style.left=xP+"px";}

document.addEventListener("keydown",function(e){
if(e.key==="ArrowLeft") moveLeft();
if(e.key==="ArrowRight") moveRight();
});

</script>
</body>
</html>
